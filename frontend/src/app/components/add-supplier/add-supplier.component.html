<div class="client-container">
  <form [formGroup]="addSupplierForm" class="client-form">
    <!-- Row 1: שם ספק ומספר ספק -->
    <div class="form-row">
      <app-input-text 
        [parentForm]="addSupplierForm" 
        [controlName]="'name'" 
        [labelText]="addSupplierService.addSupplierFields.name.labelText"
        [placeholder]="addSupplierService.addSupplierFields.name.placeHolder" 
        [type]="'text'" 
        [size]="inputSize.MEDIUM"
        class="form-field-half">
      </app-input-text>
      <app-input-text 
        [parentForm]="addSupplierForm" 
        [controlName]="'supplierID'" 
        [labelText]="addSupplierService.addSupplierFields.supplierID.labelText"
        [placeholder]="addSupplierService.addSupplierFields.supplierID.placeHolder" 
        [type]="'text'" 
        [size]="inputSize.MEDIUM"
        class="form-field-half">
      </app-input-text>
    </div>

    <!-- Row 2: רכוש קבוע checkbox -->
    <div class="form-row">
      <div class="checkbox-field">
        <p-checkbox 
          [formControlName]="'isEquipment'" 
          [inputId]="'isEquipment'"
          [binary]="true">
        </p-checkbox>
        <label [for]="'isEquipment'" class="checkbox-label">{{ addSupplierService.addSupplierFields.isEquipment.labelText }}</label>
      </div>
    </div>

    <!-- Row 3: קטגוריה ותת קטגוריה -->
    <div class="form-row">
      <app-input-select 
        [controlName]="'category'" 
        [labelText]="addSupplierService.addSupplierFields.category.labelText"
        [placeholder]="addSupplierService.addSupplierFields.category.placeHolder" 
        (onChangeInputSelect)="onSelectionChange($event, 'category')"
        [items]="addSupplierService.addSupplierFields.category.enumValues" 
        [parentForm]="addSupplierForm" 
        [size]="inputSize.MEDIUM"
        class="form-field-half">
      </app-input-select>
      <app-input-select 
        [controlName]="'subCategory'" 
        [labelText]="addSupplierService.addSupplierFields.subCategory.labelText"
        [placeholder]="addSupplierService.addSupplierFields.subCategory.placeHolder" 
        (onChangeInputSelect)="onSelectionChange($event, 'subCategory')"
        [items]="subCategories()" 
        [parentForm]="addSupplierForm" 
        [size]="inputSize.MEDIUM"
        class="form-field-half">
      </app-input-select>
    </div>

    <!-- Row 4: אחוז מוכר למע"מ ולמס הכנסה או פחת -->
    <div class="form-row">
      @if (!isEquipmentChecked()) {
        <!-- Show vatPercent and taxPercent when NOT fixed asset -->
        <app-input-text 
          [parentForm]="addSupplierForm" 
          [controlName]="'vatPercent'" 
          [labelText]="addSupplierService.addSupplierFields.vatPercent.labelText"
          [placeholder]="addSupplierService.addSupplierFields.vatPercent.placeHolder" 
          [type]="'number'" 
          [size]="inputSize.MEDIUM"
          class="form-field-half">
        </app-input-text>
        <app-input-text 
          [parentForm]="addSupplierForm" 
          [controlName]="'taxPercent'" 
          [labelText]="addSupplierService.addSupplierFields.taxPercent.labelText"
          [placeholder]="addSupplierService.addSupplierFields.taxPercent.placeHolder" 
          [type]="'number'" 
          [size]="inputSize.MEDIUM"
          class="form-field-half">
        </app-input-text>
      } @else {
        <!-- Show reductionPercent when fixed asset -->
        <app-input-text 
          [parentForm]="addSupplierForm" 
          [controlName]="'reductionPercent'" 
          [labelText]="addSupplierService.addSupplierFields.reductionPercent.labelText"
          [placeholder]="addSupplierService.addSupplierFields.reductionPercent.placeHolder" 
          [type]="'number'" 
          [size]="inputSize.MEDIUM"
          class="form-field-full">
        </app-input-text>
      }
    </div>
  </form>
  <div>
    <app-p-button [disabled]="addSupplierForm.invalid" (onButtonClicked)="saveSupplier()"
      [buttonColor]="buttonColor.BLACK" [buttonSize]="buttonSize.AUTO" [buttonText]="'שמור ספק חדש'"></app-p-button>
  </div>
  @if(suppliers().length > 0) {
  <app-generic-table [title]="'רשימת הספקים הקיימים'" [dataTable]="suppliers()" [columnsTitle]="suppliersTableFields">
  </app-generic-table>
  }
</div>
