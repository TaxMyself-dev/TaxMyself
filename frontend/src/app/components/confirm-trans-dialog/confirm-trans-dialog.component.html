<p-dialog
  header="הוצאות מוכרות שלא אושרו"
  (onHide)="closeDialog()"
  [modal]="true"
  [(visible)]="dialogVisible"
  [style]="dialogStyle()">

  <div class="inner-dialog">
    <p>רגע לפני שנעבור להפקת הדוח, מצאנו {{arrayLength()}} הוצאות שלא אושרו</p>

    <app-generic-table
      (fileChange)="onFileChange($event)"
      [filesAttached]="filesAttachedMap()"
      (isAllChecked)="onAllChecked($event)"
      (rowsChecked)="onChecked($event)"
      [dataTable]="data()"
      [selectionModeCheckBox]="'multiple'"
      [columnsTitle]="fieldsNamesExpenses"
      [showCheckbox]="true"
      [defaultSelectedValue]="true"
      [mobileCardConfig]="mobileCardConfig"
      [tableHeight]="'700px'">
    </app-generic-table>
  </div>

  <ng-template pTemplate="footer">
    <div class="footer">
      <p class="footer-warning" [ngStyle]="{visibility: !isAllChecked() ? 'visible' : 'hidden'}">
        שים לב שלא אישרת את כל ההוצאות!
      </p>
      <div class="footer-buttons">
        <app-p-button
          (onButtonClicked)="closeDialog()"
          [buttonColor]="buttonColor.WHITE_BORDER"
          [buttonSize]="footerButtonSize()"
          buttonText="ביטול">
        </app-p-button>
        <app-p-button
          [buttonColor]="buttonColor.BLACK"
          (onButtonClicked)="sendArray()"
          [buttonSize]="footerButtonSize()"
          buttonText="אישור והמשך"
          [isLoading]="isLoadingButton()">
        </app-p-button>
      </div>
    </div>
  </ng-template>

</p-dialog>
