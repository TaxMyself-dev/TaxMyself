<div class="billing-coupons">

  <div class="table-header-row">
    <app-p-button
      [icon]="'pi pi-plus'"
      [buttonText]="'הוספת קופון'"
      [buttonSize]="buttonSize.SMALL"
      (onButtonClicked)="openCreate()">
    </app-p-button>
    <p class="table-title">קופונים</p>
  </div>

  <app-generic-table
    [title]="''"
    [columnsTitle]="columnsTitle"
    [dataTable]="tableRows()"
    [rowActions]="rowActions"
    [isLoadingState]="isLoading()"
    [placeholderSearch]="'חיפוש לפי קוד קופון'"
    columnSearch="code"
    tableHeight="520px">
  </app-generic-table>

</div>

<!-- ── Create / Edit Dialog ──────────────────────────────────────────── -->
<p-dialog
  [header]="isEditMode ? 'עריכת קופון' : 'הוספת קופון'"
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  [modal]="true"
  [style]="{ width: '580px' }"
  [draggable]="false"
  [resizable]="false"
  (onHide)="onHide()">

  <div [formGroup]="couponForm" class="dialog-form" dir="rtl">

    <!-- Code — raw input with LTR (coupon codes are always LTR uppercase) -->
    <div class="form-row">
      <label>קוד קופון <span class="required">*</span></label>
      <input type="text" pInputText formControlName="code" dir="ltr" placeholder="לדוגמה: SUMMER20" />
      @if (fieldInvalid('code')) {
        <small class="field-error">קוד קופון הוא שדה חובה (עד 100 תווים)</small>
      }
    </div>

    <!-- Name -->
    <app-input-text
      [parentForm]="couponForm"
      controlName="name"
      labelText="שם קופון"
      placeholder="לדוגמה: הנחת קיץ">
    </app-input-text>

    <!-- Description -->
    <div class="form-row">
      <label>תיאור</label>
      <textarea pTextarea formControlName="description" rows="2" placeholder="תיאור קצר של הקופון"></textarea>
    </div>

    <!-- Discount type -->
    <app-input-select
      [parentForm]="couponForm"
      controlName="discountType"
      labelText="סוג הנחה"
      placeholder="בחר סוג הנחה"
      [items]="discountTypeOptions"
      [showClear]="false"
      [filter]="false">
    </app-input-select>

    <!-- Conditional discount value fields -->
    @if (selectedDiscountType === 'PERCENT') {
      <div class="form-row">
        <label>אחוז הנחה (0–100)</label>
        <p-inputNumber formControlName="discountPercent" [min]="0" [max]="100" suffix="%" [useGrouping]="false"></p-inputNumber>
      </div>
    }
    @if (selectedDiscountType === 'FIXED_AMOUNT' || selectedDiscountType === 'FIXED_PRICE') {
      <div class="form-row">
        <label>
          @if (selectedDiscountType === 'FIXED_AMOUNT') { סכום הנחה (₪) }
          @else { מחיר סופי קבוע (₪) }
        </label>
        <p-inputNumber
          formControlName="discountValueShekels"
          mode="currency"
          currency="ILS"
          locale="he-IL"
          [minFractionDigits]="2"
          [min]="0">
        </p-inputNumber>
      </div>
    }

    <!-- Duration type -->
    <app-input-select
      [parentForm]="couponForm"
      controlName="durationType"
      labelText="משך הנחה"
      placeholder="בחר משך"
      [items]="durationTypeOptions"
      [showClear]="false"
      [filter]="false">
    </app-input-select>

    <!-- Duration months — shown only for REPEATING -->
    @if (selectedDurationType === 'REPEATING') {
      <div class="form-row">
        <label>מספר חודשים</label>
        <p-inputNumber formControlName="durationMonths" [min]="1" [useGrouping]="false"></p-inputNumber>
      </div>
    }

    <!-- Date range -->
    <div class="form-row-inline">
      <app-input-date
        [parentForm]="couponForm"
        controlName="startsAt"
        labelText="תאריך התחלה"
        placeholder="dd/mm/yyyy">
      </app-input-date>
      <app-input-date
        [parentForm]="couponForm"
        controlName="endsAt"
        labelText="תאריך סיום"
        placeholder="dd/mm/yyyy">
      </app-input-date>
    </div>

    <!-- Max redemptions total & per user -->
    <div class="form-row-inline">
      <div class="form-row">
        <label>מקסימום מימושים</label>
        <p-inputNumber formControlName="maxRedemptions" [min]="1" [useGrouping]="false" placeholder="ללא מגבלה"></p-inputNumber>
      </div>
      <div class="form-row">
        <label>מקסימום למשתמש</label>
        <p-inputNumber formControlName="maxRedemptionsPerUser" [min]="1" [useGrouping]="false"></p-inputNumber>
      </div>
    </div>

    <!-- Applies to plans -->
    <div class="form-row">
      <label>חל על תוכניות</label>
      <p-multiselect
        formControlName="appliesToPlanIds"
        [options]="planOptions()"
        optionLabel="label"
        optionValue="value"
        placeholder="כל התוכניות (ריק = הכל)"
        display="chip"
        appendTo="body">
      </p-multiselect>
    </div>

    <!-- Active toggle -->
    <div class="form-row check-row-group">
      <div class="check-item">
        <p-checkbox formControlName="isActive" [binary]="true" inputId="couponIsActive"></p-checkbox>
        <label for="couponIsActive">פעיל</label>
      </div>
    </div>

  </div>

  <ng-template pTemplate="footer">
    <app-p-button
      [buttonText]="'ביטול'"
      [buttonSize]="buttonSize.SMALL"
      (onButtonClicked)="closeDialog()">
    </app-p-button>
    <app-p-button
      [buttonText]="isEditMode ? 'עדכן' : 'צור קופון'"
      [buttonSize]="buttonSize.SMALL"
      [isLoading]="saving()"
      (onButtonClicked)="saveCoupon()">
    </app-p-button>
  </ng-template>
</p-dialog>

<p-confirmDialog></p-confirmDialog>
<p-toast position="bottom-right"></p-toast>
