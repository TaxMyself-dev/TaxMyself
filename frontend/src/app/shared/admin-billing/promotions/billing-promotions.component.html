<div class="billing-promotions">

  <div class="table-header-row">
    <app-p-button
      [icon]="'pi pi-plus'"
      [buttonText]="'הוספת מבצע'"
      [buttonSize]="buttonSize.SMALL"
      (onButtonClicked)="openCreate()">
    </app-p-button>
    <p class="table-title">מבצעים</p>
  </div>

  <app-generic-table
    [title]="''"
    [columnsTitle]="columnsTitle"
    [dataTable]="tableRows()"
    [rowActions]="rowActions"
    [isLoadingState]="isLoading()"
    [placeholderSearch]="'חיפוש לפי שם מבצע'"
    columnSearch="name"
    tableHeight="520px">
  </app-generic-table>

</div>

<!-- ── Create / Edit Dialog ──────────────────────────────────────────── -->
<p-dialog
  [header]="isEditMode ? 'עריכת מבצע' : 'הוספת מבצע'"
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  [modal]="true"
  [style]="{ width: '580px' }"
  [draggable]="false"
  [resizable]="false"
  (onHide)="onHide()">

  <!-- div instead of form — app-input-* components create their own <form> wrappers internally -->
  <div [formGroup]="promotionForm" class="dialog-form" dir="rtl">

    <!-- Name — app-input-text (project standard) -->
    <app-input-text
      [parentForm]="promotionForm"
      controlName="name"
      labelText="שם מבצע"
      placeholder="לדוגמה: השקה מיוחדת">
    </app-input-text>

    <!-- Description — no app wrapper for textarea -->
    <div class="form-row">
      <label>תיאור</label>
      <textarea pTextarea formControlName="description" rows="2" placeholder="תיאור קצר של המבצע"></textarea>
    </div>

    <!-- Discount type — app-input-select (has appendTo="body" built in) -->
    <app-input-select
      [parentForm]="promotionForm"
      controlName="discountType"
      labelText="סוג הנחה"
      placeholder="בחר סוג הנחה"
      [items]="discountTypeOptions"
      [showClear]="false"
      [filter]="false">
    </app-input-select>

    <!-- Conditional discount value fields -->
    @if (selectedDiscountType === 'PERCENT') {
      <div class="form-row">
        <label>אחוז הנחה (0–100)</label>
        <p-inputNumber formControlName="discountPercent" [min]="0" [max]="100" suffix="%" [useGrouping]="false"></p-inputNumber>
      </div>
    }
    @if (selectedDiscountType === 'FIXED_AMOUNT' || selectedDiscountType === 'FIXED_PRICE') {
      <div class="form-row">
        <label>
          @if (selectedDiscountType === 'FIXED_AMOUNT') { סכום הנחה (₪) }
          @else { מחיר סופי קבוע (₪) }
        </label>
        <p-inputNumber
          formControlName="discountValueShekels"
          mode="currency"
          currency="ILS"
          locale="he-IL"
          [minFractionDigits]="2"
          [min]="0">
        </p-inputNumber>
      </div>
    }

    <!-- Duration type — app-input-select (has appendTo="body" built in) -->
    <app-input-select
      [parentForm]="promotionForm"
      controlName="durationType"
      labelText="משך הנחה"
      placeholder="בחר משך"
      [items]="durationTypeOptions"
      [showClear]="false"
      [filter]="false">
    </app-input-select>

    <!-- Duration months — shown only for REPEATING -->
    @if (selectedDurationType === 'REPEATING') {
      <div class="form-row">
        <label>מספר חודשים</label>
        <p-inputNumber formControlName="durationMonths" [min]="1" [useGrouping]="false"></p-inputNumber>
      </div>
    }

    <!-- Date range — app-input-date (has appendTo="body" built in) -->
    <div class="form-row-inline">
      <app-input-date
        [parentForm]="promotionForm"
        controlName="startsAt"
        labelText="תאריך התחלה"
        placeholder="dd/mm/yyyy">
      </app-input-date>
      <app-input-date
        [parentForm]="promotionForm"
        controlName="endsAt"
        labelText="תאריך סיום"
        placeholder="dd/mm/yyyy">
      </app-input-date>
    </div>

    <!-- Priority & max redemptions -->
    <div class="form-row-inline">
      <div class="form-row">
        <label>עדיפות</label>
        <p-inputNumber formControlName="priority" [min]="0" [useGrouping]="false"></p-inputNumber>
      </div>
      <div class="form-row">
        <label>מקסימום מימושים</label>
        <p-inputNumber formControlName="maxRedemptions" [min]="1" [useGrouping]="false" placeholder="ללא מגבלה"></p-inputNumber>
      </div>
    </div>

    <!-- Applies to plans — appendTo="body" prevents panel closing on dialog scroll -->
    <div class="form-row">
      <label>חל על תוכניות</label>
      <p-multiselect
        formControlName="appliesToPlanIds"
        [options]="planOptions()"
        optionLabel="label"
        optionValue="value"
        placeholder="כל התוכניות (ריק = הכל)"
        display="chip"
        appendTo="body">
      </p-multiselect>
    </div>

    <!-- Active toggle -->
    <div class="form-row check-row-group">
      <div class="check-item">
        <p-checkbox formControlName="isActive" [binary]="true" inputId="promoIsActive"></p-checkbox>
        <label for="promoIsActive">פעיל</label>
      </div>
    </div>

  </div>

  <ng-template pTemplate="footer">
    <app-p-button
      [buttonText]="'ביטול'"
      [buttonSize]="buttonSize.SMALL"
      (onButtonClicked)="closeDialog()">
    </app-p-button>
    <app-p-button
      [buttonText]="isEditMode ? 'עדכן' : 'צור מבצע'"
      [buttonSize]="buttonSize.SMALL"
      [isLoading]="saving()"
      (onButtonClicked)="savePromotion()">
    </app-p-button>
  </ng-template>
</p-dialog>

<p-confirmDialog></p-confirmDialog>
<p-toast position="bottom-right"></p-toast>
