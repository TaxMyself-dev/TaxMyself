<div class="admin-billing">
  <app-tab-bar
    [tabs]="subTabs"
    [selectedTab]="selectedSubTab()"
    (selectedTabChange)="onSubTabChange($event)">
  </app-tab-bar>

  <div class="admin-billing__content">
    @if (selectedSubTab() === 'plans') {
      <app-billing-plans></app-billing-plans>
    }
    @if (selectedSubTab() === 'subscriptions') {
      <app-billing-subscriptions></app-billing-subscriptions>
    }
  </div>
</div>
