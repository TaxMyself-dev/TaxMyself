<div class="table-block">

    <!-- FILTER TAB -->
    <app-filter-tab
        [config]="filterConfig"
        [parentForm]="form"
        (apply)="onSubmit($event)">
    </app-filter-tab>

    <!-- PAGE TITLE -->
     <h2 class="table-title">
        הוצאות עבור העסק:
        <span class="business-name">{{ selectedBusinessName() }}</span>
    </h2>

    <!-- EXPENSES TABLE (P&L / regular) -->
    <app-generic-table
        class="table"
        [isLoadingState]="isLoadingDataTable()"
        [columnsTitle]="expensesTableFields"
        [dataTable]="myExpenses | async"
        [fileActions]="fileActions()"
        [selectionModeCheckBox]="null"
        [mobileCardConfig]="mobileCardConfig"
        [tableHeight]="'500px'">
    </app-generic-table>

    <!-- ANNUAL-REPORT-ONLY EXPENSES (separate section, below the regular ones) -->
    @if ($any(myAnnualExpenses | async)?.length) {
      <h2 class="business-title" style="margin-top: 28px;">הוצאות לדוח שנתי בלבד</h2>
      <app-generic-table
          class="table"
          [isLoadingState]="isLoadingDataTable()"
          [columnsTitle]="annualExpensesTableFields"
          [dataTable]="myAnnualExpenses | async"
          [fileActions]="fileActions()"
          [selectionModeCheckBox]="null"
          [mobileCardConfig]="mobileCardConfig"
          [tableHeight]="'400px'">
      </app-generic-table>
    }

</div>

<!-- p-toast and p-confirmDialog are provided globally in app.component.html -->
