<div class="table-block">

    <!-- FILTER TAB -->
    @if (businessOptions.length > 1) {
    <app-filter-tab [config]="filterConfig" [parentForm]="form" (apply)="onSubmit($event)">
    </app-filter-tab>
    }

    <!-- PAGE TITLE -->
    <h2 class="table-title">
        ספקים עבור העסק:
        <span class="business-name">{{ selectedBusinessName() }}</span>
    </h2>

    <!-- SUPPLIERS TABLE -->
    <app-generic-table class="table" [isLoadingState]="isLoadingDataTable()" [columnsTitle]="suppliersTableFields"
        [dataTable]="mySuppliers | async" [fileActions]="fileActions()" [selectionModeCheckBox]="null"
        [tableHeight]="'500px'">
    </app-generic-table>

</div>

<!-- p-toast and p-confirmDialog are provided globally in app.component.html -->
