<div class="table-block">

    <!-- FILTER TAB -->
    @if (businessOptions.length > 1) {
    <app-filter-tab [config]="filterConfig" [parentForm]="form" (apply)="onSubmit($event)">
    </app-filter-tab>
    }

    <!-- PAGE TITLE -->
    <h2 class="table-title">
        לקוחות עבור העסק:
        <span class="business-name">{{ selectedBusinessName() }}</span>
    </h2>

    <!-- CLIENTS TABLE -->
    <app-generic-table class="table" [isLoadingState]="isLoadingDataTable()" [columnsTitle]="clientsTableFields"
        [dataTable]="myClients | async" [fileActions]="fileActions()" [selectionModeCheckBox]="null"
        [tableHeight]="'500px'" [mobileCardConfig]="mobileCardConfig" [mobileCardActions]="fileActions()">
    </app-generic-table>

</div>

<!-- p-toast and p-confirmDialog are provided globally in app.component.html -->
