<div class="table-block">

    <!-- FILTER TAB -->
    @if (businessOptions.length > 1) {
    <app-filter-tab [config]="filterConfig" [parentForm]="form" (apply)="onSubmit($event)">
    </app-filter-tab>
    }

    <!-- PAGE TITLE -->
    <h2 class="table-title">
        ארכיון מסמכים עבור העסק:
        <span class="business-name">{{ selectedBusinessName() }}</span>
    </h2>

    <!-- ARCHIVED DOCUMENTS TABLE -->
    <app-generic-table class="table" [isLoadingState]="isLoadingDataTable()" [columnsTitle]="archivedDocsTableFields"
        [dataTable]="myArchivedDocs | async" [fileActions]="fileActions()" [selectionModeCheckBox]="null"
        [tableHeight]="'500px'" [mobileCardConfig]="mobileCardConfig" [mobileCardActions]="fileActions()">
    </app-generic-table>

</div>
